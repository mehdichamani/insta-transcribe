services:
  bot:
    build: .
    container_name: insta_transcribe_bot
    restart: unless-stopped
    network_mode: host
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # Passes proxy settings seamlessly for your WorkPC if defined in .env
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - http_proxy=${HTTP_PROXY:-}
      - https_proxy=${HTTPS_PROXY:-}
    volumes:
      # Keep the heavy AI model safely cached on the host
      - whisper_cache:/root/.cache/whisper

volumes:
  whisper_cache:
    name: whisper_model_cache